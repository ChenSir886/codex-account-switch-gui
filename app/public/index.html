<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Account Switch</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <h1>Codex Account Switch</h1>
            <p>Beautiful local control for Codex identities</p>
          </div>
        </div>
        <div class="panel">
          <div class="locale-switch" role="group" aria-label="language switch">
            <button id="langZhButton" class="button locale-button active" type="button">中文</button>
            <button id="langEnButton" class="button locale-button" type="button">EN</button>
          </div>
          <button id="refreshButton" class="button primary wide"></button>
          <button id="addButton" class="button secondary wide"></button>
        </div>
        <div class="panel muted">
          <p id="sidebarTip1"></p>
          <p id="sidebarTip2"></p>
        </div>
      </aside>

      <main class="content">
        <section class="hero">
          <div>
            <p id="heroEyebrow" class="eyebrow"></p>
            <h2 id="heroTitle"></h2>
          </div>
          <div id="statusBadge" class="status-badge"></div>
        </section>

        <section class="accounts-toolbar">
          <button id="createGroupButton" class="button ghost" type="button"></button>
        </section>

        <section id="accountsGrid" class="accounts-grid"></section>

        <section id="trashSection" class="trash-section hidden">
          <div class="trash-header">
            <h3 id="trashTitle"></h3>
            <span id="trashCount" class="status-badge"></span>
          </div>
          <div id="trashGrid" class="trash-grid"></div>
        </section>

        <section class="console">
          <div class="console-header">
            <h3 id="consoleTitle"></h3>
            <a id="authLink" class="button ghost hidden" target="_blank" rel="noreferrer"></a>
          </div>
          <pre id="logOutput"></pre>
        </section>
      </main>
    </div>

    <div id="groupDialog" class="modal hidden" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-panel">
        <h3 id="groupDialogTitle"></h3>
        <label class="form-field">
          <span id="groupNameLabel"></span>
          <input id="newGroupNameInput" type="text" autocomplete="off" />
        </label>
        <label class="form-field">
          <span id="groupNoteLabel"></span>
          <textarea id="newGroupNoteInput" rows="3"></textarea>
        </label>
        <p id="groupDialogError" class="dialog-error"></p>
        <div class="modal-actions">
          <button id="cancelGroupButton" class="button secondary" type="button"></button>
          <button id="confirmGroupButton" class="button primary" type="button"></button>
        </div>
      </div>
    </div>

    <template id="accountCardTemplate">
      <article class="account-card">
        <div class="account-top">
          <div>
            <p class="account-index"></p>
            <h3 class="account-email"></h3>
          </div>
          <span class="plan-pill"></span>
        </div>
        <label class="group-select-label">
          <span class="label-group"></span>
          <select class="group-select"></select>
        </label>
        <div class="usage-grid">
          <div>
            <span class="label-5h"></span>
            <strong class="usage-5h"></strong>
          </div>
          <div>
            <span class="label-weekly"></span>
            <strong class="usage-weekly"></strong>
          </div>
          <div>
            <span class="label-last-activity"></span>
            <strong class="last-activity"></strong>
          </div>
        </div>
        <div class="card-actions">
          <span class="active-label hidden"></span>
          <div class="account-actions">
            <button class="button danger trash-account-button" type="button"></button>
            <button class="button primary switch-button" type="button"></button>
          </div>
        </div>
      </article>
    </template>

    <template id="trashCardTemplate">
      <article class="trash-card">
        <div>
          <p class="trash-index"></p>
          <h3 class="trash-email"></h3>
          <p class="trash-meta"></p>
        </div>
        <div class="trash-actions">
          <button class="button secondary restore-account-button" type="button"></button>
          <button class="button danger delete-account-button" type="button"></button>
        </div>
      </article>
    </template>

    <template id="groupSectionTemplate">
      <section class="group-section">
        <div class="group-header">
          <div>
            <input class="group-name-input" type="text" />
            <textarea class="group-note-input" rows="2"></textarea>
          </div>
          <div class="group-actions">
            <button class="button secondary save-group-button" type="button"></button>
            <button class="button danger delete-group-button" type="button"></button>
          </div>
        </div>
        <div class="group-accounts"></div>
      </section>
    </template>

    <script src="/app.js"></script>
  </body>
  </html>
